[build]
  command = "npm run build"
  publish = "dist" 

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["serverless-http", "express", "cors", "openai", "pg"]

# Map /api/* to Netlify functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
